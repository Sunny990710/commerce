/** 온보딩 1~4단계 공통 진행 바 (스타일 → 브랜드 → 가격대 → 신체정보) */
function renderOnboardingProgressBar(step1to4) {
  const n = Math.min(4, Math.max(1, step1to4));
  const p = n / 4;
  return h(
    'div',
    {
      className: 'mt-4 h-1 w-full overflow-hidden rounded-full bg-[#e5e7eb]',
      role: 'progressbar',
      'aria-valuenow': step1to4,
      'aria-valuemin': 1,
      'aria-valuemax': 4,
      'aria-label': '온보딩 ' + step1to4 + '/4 단계',
    },
    h('div', {
      className: 'h-full rounded-full bg-[#111]',
      style: { width: p * 100 + '%' },
    })
  );
}

/** 대화 탭: 매칭 상위 3개 뒤에 카탈로그를 이어 붙여, 처음 3개 + '더보기' 시 최대 12개 추가(총 15)까지 표시 가능한 풀을 만든다. */
function expandChatSearchProductList(primary, maxTotal = 15) {
  const seen = new Set();
  const out = [];
  for (const p of primary) {
    if (p && !seen.has(String(p.id))) {
      seen.add(String(p.id));
      out.push(p);
    }
  }
  for (const p of MOCK_PRODUCTS) {
    if (out.length >= maxTotal) break;
    if (!seen.has(String(p.id))) {
      seen.add(String(p.id));
      out.push(p);
    }
  }
  return out;
}

const getSimilarProducts = (product, limit = 15) => {
  const id = String(product.id);
  const pool = MOCK_PRODUCTS.filter((p) => String(p.id) !== id);
  const sameCat = pool.filter((p) => p.category === product.category);
  const rest = pool.filter((p) => p.category !== product.category);
  const merged = [...sameCat, ...rest];
  if (merged.length >= limit) return merged.slice(0, limit);
  const out = [...merged];
  let i = 0;
  while (out.length < limit && pool.length) {
    out.push(pool[i % pool.length]);
    i++;
  }
  return out.slice(0, limit);
};

/** 분할 화면 우측: 비슷한 상품 / 함께 구매 / 동일 브랜드(중복 제외) */
const getExploreTierProducts = (product) => {
  const pid = String(product.id);
  const similarList = getSimilarProducts(product, 6);
  const sIds = new Set(similarList.map((p) => String(p.id)));
  const boughtTogether = MOCK_PRODUCTS.filter(
    (p) => String(p.id) !== pid && !sIds.has(String(p.id))
  ).slice(0, 6);
  const bIds = new Set(boughtTogether.map((p) => String(p.id)));
  let sameBrandList = MOCK_PRODUCTS.filter(
    (p) =>
      String(p.id) !== pid &&
      p.brand === product.brand &&
      !sIds.has(String(p.id)) &&
      !bIds.has(String(p.id))
  ).slice(0, 6);
  if (sameBrandList.length < 2) {
    sameBrandList = MOCK_PRODUCTS.filter(
      (p) => String(p.id) !== pid && p.brand === product.brand && !sIds.has(String(p.id))
    ).slice(0, 6);
  }
  /** 동일 브랜드 SKU가 없거나 모두 위 두 섹션에만 걸러진 경우: 카드가 비지 않도록 대체(썸네일은 br 슬롯 이미지) */
  if (sameBrandList.length === 0) {
    const BR_LINE_LABELS = ['데일리 룩', '시즌 스타일', '컬러웨이', '코디 세트', '베스트 핏', '신상 라인'];
    sameBrandList = MOCK_PRODUCTS.filter((p) => String(p.id) !== pid)
      .slice(0, 6)
      .map((p, i) => ({
        ...p,
        _sameBrandTierFallback: true,
        _sameBrandLineName: BR_LINE_LABELS[i] || '추천 ' + (i + 1),
      }));
  }
  return { similarList, boughtTogether, sameBrandList };
};

function getExploreRelatedTags(product) {
  if (!product) return [];
  const cat = product.category || '';
  const tag = product.tag ? String(product.tag) : '';
  const pool = [...(EXPLORE_RELATED_TAGS_BY_CATEGORY[cat] || ['데일리', '스타일', '코디', '추천', '신상'])];
  if (tag && !pool.includes(tag)) pool.unshift(tag);
  const seen = new Set();
  const out = [];
  for (const t of pool) {
    if (t && !seen.has(t)) {
      seen.add(t);
      out.push(t);

    if (out.length >= 10) break;
  }
  return out;

function formatInlineBold(text) {
  if (text == null || text === '') return null;
  const parts = String(text).split(/(\*\*[^*]+\*\*)/g);
  return parts.map((part, i) => {
    if (part.startsWith('**') && part.endsWith('**')) {
      return h('strong', { key: i, className: 'font-semibold text-[#111]' }, part.slice(2, -2));
    }
    return part;
  });
}

function PriceTrackModal({ product, onClose, onStartTracking }) {
  const [targetPrice, setTargetPrice] = useState(product.price * 0.8);
  const [agenticCheckout, setAgenticCheckout] = useState(true);
  const [activeTab, setActiveTab] = useState('TRACK'); // TRACK | TREND
  const pct = ((targetPrice - product.price * 0.5) / (product.price * 0.5)) * 100;

  // Generate mock trend data based on product price
  const baseP = product.price;
  const trendData = [
    { week: '1월 1주', price: Math.round(baseP * 1.12), rank: 8 },
    { week: '1월 2주', price: Math.round(baseP * 1.08), rank: 6 },
    { week: '1월 3주', price: Math.round(baseP * 1.05), rank: 5 },
    { week: '1월 4주', price: Math.round(baseP * 1.02), rank: 4 },
    { week: '2월 1주', price: Math.round(baseP * 1.0), rank: 3 },
    { week: '2월 2주', price: Math.round(baseP * 0.98), rank: 2 },
    { week: '2월 3주', price: Math.round(baseP * 0.95), rank: 1 },
    { week: '2월 4주', price: Math.round(baseP * 1.0), rank: 2 },
  ];
  const maxPrice = Math.max(...trendData.map(d => d.price));
  const minPrice = Math.min(...trendData.map(d => d.price));
  const maxRank = Math.max(...trendData.map(d => d.rank));
  const priceChange = trendData[trendData.length - 1].price - trendData[0].price;
  const priceChangePct = Math.round((priceChange / trendData[0].price) * 100);

  // SVG chart dimensions
  const chartW = 440, chartH = 200, padL = 50, padR = 30, padT = 20, padB = 40;
  const plotW = chartW - padL - padR, plotH = chartH - padT - padB;

  const priceToY = (p) => padT + plotH - ((p - minPrice) / (maxPrice - minPrice || 1)) * plotH;
  const rankToY = (r) => padT + ((r - 1) / (maxRank - 1 || 1)) * plotH;
  const idxToX = (i) => padL + (i / (trendData.length - 1)) * plotW;

  const pricePath = trendData.map((d, i) => `${i === 0 ? 'M' : 'L'}${idxToX(i)},${priceToY(d.price)}`).join(' ');
  const rankPath = trendData.map((d, i) => `${i === 0 ? 'M' : 'L'}${idxToX(i)},${rankToY(d.rank)}`).join(' ');

  return h('div', { className: 'fixed inset-0 z-[100] flex items-end sm:items-center justify-center bg-black/80 backdrop-blur-md p-0 sm:p-6', onClick: onClose },
    h('div', { className: 'w-full max-w-2xl bg-white rounded-t-3xl sm:rounded-[2rem] p-5 sm:p-8 lg:p-10 shadow-2xl overflow-hidden relative animate-fadeIn max-h-[92vh] sm:max-h-[90vh] overflow-y-auto no-scrollbar', onClick: e => e.stopPropagation() },
      h('div', { className: 'absolute top-0 left-0 w-full h-3 bg-[#111]' }),
      // Header
      h('div', { className: 'flex justify-between items-center mb-8' },
        h('div', { className: 'flex items-center gap-4 text-slate-900' },
          h('div', { className: 'w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center' }, h(TrendingDown, { size: 24 })),
          h('div', null,
            h('h2', { className: 'text-2xl editorial-title' }, 'Price Intelligence'),
            h('p', { className: 'text-slate-400 text-xs font-medium' }, 'AI 기반 시장 모니터링 & 트렌드 분석')
          )
        ),
        h('button', { onClick: onClose, className: 'p-3 hover:bg-slate-50 rounded-full transition-colors' }, h(X, { size: 24, className: 'text-slate-400' }))
      ),
      // Product info
      h('div', { className: 'bg-[#fafafa] rounded-2xl p-4 sm:p-6 flex flex-col sm:flex-row gap-4 sm:gap-6 mb-6 border border-[#ebebeb]' },
        h('img', { src: product.image, className: 'w-full sm:w-20 h-48 sm:h-20 rounded-xl object-cover border border-[#ebebeb] sm:flex-shrink-0', referrerPolicy: 'no-referrer' }),
        h('div', { className: 'flex-1' },
          h('p', { className: 'text-[10px] text-[#888] font-medium uppercase tracking-widest mb-1' }, product.brand),
          h('h3', { className: 'text-lg font-bold text-slate-900 leading-tight mb-1' }, product.name),
          h('p', { className: 'text-sm text-slate-500 font-medium' }, '현재 시장가: ', h('span', { className: 'text-slate-900 font-black' }, fmt(product.price)))
        )
      ),
      // Tab switcher
      h('div', { className: 'flex bg-[#f5f5f5] rounded-xl p-1 mb-6 border border-[#ebebeb]' },
        ...[
          { id: 'TRACK', label: '가격 추적', icon: Bell },
          { id: 'TREND', label: '추이 분석', icon: TrendingDown }
        ].map(tab =>
          h('button', {
            key: tab.id,
            onClick: () => setActiveTab(tab.id),
            className: `flex-1 flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-bold transition-all ${activeTab === tab.id ? 'bg-white text-slate-900 shadow-md' : 'text-slate-400 hover:text-slate-600'}`
          }, h(tab.icon, { size: 16 }), tab.label)
        )
      ),
      // ── TRACK TAB ──
      activeTab === 'TRACK' ? h('div', null,
        // Slider
        h('div', { className: 'mb-8' },
          h('div', { className: 'flex justify-between items-center mb-4' },
            h('span', { className: 'text-sm font-bold text-slate-900' }, '목표 구매가'),
            h('span', { className: 'bg-[#f0f0f0] text-[#111] text-[10px] font-medium px-3 py-1 rounded-full border border-[#ebebeb]' }, 'AI 추천: ' + fmt(Math.round(product.price * 0.75)))
          ),
          h('div', { className: 'relative h-3 bg-slate-100 rounded-full mb-4' },
            h('div', { className: 'absolute h-full bg-slate-900 rounded-full transition-all duration-300', style: { width: `${Math.min(100, Math.max(0, pct))}%` } }),
            h('input', { type: 'range', min: product.price * 0.5, max: product.price, value: targetPrice, onChange: e => setTargetPrice(Number(e.target.value)), className: 'absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10' })
          ),
          h('div', { className: 'flex justify-between text-[10px] font-black text-slate-400' },
            h('span', null, fmt(Math.round(product.price * 0.5))),
            h('span', { className: 'text-slate-900 text-xl font-serif italic' }, fmt(Math.round(targetPrice))),
            h('span', null, fmt(product.price))
          )
        ),
        // Agentic checkout
        h('div', { className: 'bg-[#111] rounded-2xl p-6 flex items-start gap-4 mb-8 shadow-card' },
          h('div', { className: 'bg-white/10 p-2.5 rounded-xl text-white' }, h(Sparkles, { size: 22, strokeWidth: 1.5 })),
          h('div', { className: 'flex-1' },
            h('div', { className: 'flex justify-between items-center mb-1.5' },
              h('h4', { className: 'text-base font-bold text-white' }, '자율 구매'),
              h('button', { onClick: () => setAgenticCheckout(!agenticCheckout), className: `w-12 h-6 rounded-full transition-all relative ${agenticCheckout ? 'bg-white' : 'bg-white/20'}` },
                h('div', { className: `absolute top-0.5 w-5 h-5 rounded-full transition-all shadow-md ${agenticCheckout ? 'left-6 bg-[#111]' : 'left-0.5 bg-white'}` })
              )
            ),
            h('p', { className: 'text-slate-400 text-xs leading-relaxed' }, '목표가 도달 시 AI가 자동 구매를 실행합니다.')
          )
        )
      ) : null,
      // ── TREND TAB ──
      activeTab === 'TREND' ? h('div', null,
        // Trend summary cards
        h('div', { className: 'grid grid-cols-1 sm:grid-cols-3 gap-3 mb-6' },
          h('div', { className: 'bg-slate-50 rounded-2xl p-4 text-center border border-slate-100' },
            h('p', { className: 'text-[10px] text-slate-400 font-bold mb-1' }, '8주 최저가'),
            h('p', { className: 'text-lg font-black text-emerald-600' }, fmt(minPrice))
          ),
          h('div', { className: 'bg-slate-50 rounded-2xl p-4 text-center border border-slate-100' },
            h('p', { className: 'text-[10px] text-slate-400 font-bold mb-1' }, '가격 변동'),
            h('p', { className: `text-lg font-black ${priceChange <= 0 ? 'text-emerald-600' : 'text-rose-500'}` }, (priceChange <= 0 ? '▼ ' : '▲ ') + Math.abs(priceChangePct) + '%')
          ),
          h('div', { className: 'bg-slate-50 rounded-2xl p-4 text-center border border-slate-100' },
            h('p', { className: 'text-[10px] text-slate-400 font-bold mb-1' }, '현재 순위'),
            h('p', { className: 'text-lg font-semibold text-[#111]' }, trendData[trendData.length - 1].rank + '위')
          )
        ),
        // SVG Chart — dark theme
        h('div', { className: 'bg-slate-900 rounded-2xl sm:rounded-3xl p-4 sm:p-6 mb-6 shadow-xl overflow-hidden' },
          h('h4', { className: 'text-white font-bold text-sm mb-4' }, '추이 분석'),
          h('svg', { viewBox: `0 0 ${chartW} ${chartH}`, className: 'w-full', style: { height: '220px' } },
            // Grid lines
            ...[0, 0.25, 0.5, 0.75, 1].map(f => {
              const y = padT + plotH * (1 - f);
              return h('line', { key: 'g' + f, x1: padL, y1: y, x2: chartW - padR, y2: y, stroke: '#334155', strokeWidth: 0.5, strokeDasharray: f > 0 && f < 1 ? '4,4' : 'none' });
            }),
            // Y-axis labels (price)
            ...[0, 0.5, 1].map(f => {
              const val = Math.round(minPrice + (maxPrice - minPrice) * f);
              const y = padT + plotH * (1 - f);
              return h('text', { key: 'yp' + f, x: padL - 8, y: y + 4, textAnchor: 'end', fill: '#64748b', fontSize: 9, fontWeight: 600 }, (val / 1000).toFixed(0) + 'k');
            }),
            // Y-axis label right (rank)
            ...[1, Math.ceil(maxRank / 2), maxRank].map((r, i) => {
              const y = rankToY(r);
              return h('text', { key: 'yr' + i, x: chartW - padR + 8, y: y + 4, textAnchor: 'start', fill: '#4ade80', fontSize: 9, fontWeight: 600 }, r + '위');
            }),
            // X-axis labels
            ...trendData.map((d, i) => {
              const x = idxToX(i);
              return i % 2 === 0 ? h('text', { key: 'x' + i, x, y: chartH - 8, textAnchor: 'middle', fill: '#64748b', fontSize: 9, fontWeight: 600 }, d.week.replace('월 ', '/')) : null;
            }),
            // Price line (blue)
            h('path', { d: pricePath, fill: 'none', stroke: '#e5e5e5', strokeWidth: 2.5, strokeLinecap: 'round', strokeLinejoin: 'round' }),
            // Price dots
            ...trendData.map((d, i) =>
              h('circle', { key: 'pd' + i, cx: idxToX(i), cy: priceToY(d.price), r: 4, fill: '#f5f5f5', stroke: '#a3a3a3', strokeWidth: 2 })
            ),
            // Rank line (green)
            h('path', { d: rankPath, fill: 'none', stroke: '#4ade80', strokeWidth: 2.5, strokeLinecap: 'round', strokeLinejoin: 'round' }),
            // Rank dots
            ...trendData.map((d, i) =>
              h('circle', { key: 'rd' + i, cx: idxToX(i), cy: rankToY(d.rank), r: 4, fill: '#4ade80', stroke: '#1e293b', strokeWidth: 2 })
            ),
            // Axis labels
            h('text', { x: 8, y: chartH / 2, textAnchor: 'middle', fill: '#94a3b8', fontSize: 9, fontWeight: 700, transform: `rotate(-90, 8, ${chartH / 2})` }, '가격 (원)'),
            h('text', { x: chartW - 4, y: chartH / 2, textAnchor: 'middle', fill: '#4ade80', fontSize: 9, fontWeight: 700, transform: `rotate(90, ${chartW - 4}, ${chartH / 2})` }, '순위')
          ),
          // Legend
          h('div', { className: 'flex justify-center gap-6 mt-3' },
            h('div', { className: 'flex items-center gap-2' },
              h('div', { className: 'w-3 h-3 rounded-full bg-[#e5e5e5] border border-[#a3a3a3]' }),
              h('span', { className: 'text-[11px] text-[#cbd5e1] font-medium' }, '판매가격')
            ),
            h('div', { className: 'flex items-center gap-2' },
              h('div', { className: 'w-3 h-3 rounded-full bg-green-400' }),
              h('span', { className: 'text-[11px] text-green-400 font-bold' }, '순위')
            )
          )
        ),
        // AI insight
        h('div', { className: 'bg-[#fafafa] rounded-2xl p-5 border border-[#ebebeb]' },
          h('div', { className: 'flex items-center gap-2 mb-2' },
            h(Sparkles, { size: 14, className: 'text-[#111]', strokeWidth: 1.5 }),
            h('span', { className: 'text-xs font-semibold text-[#111]' }, 'AI 가격 인사이트')
          ),
          h('p', { className: 'text-[12px] text-[#555] leading-relaxed' },
            priceChange <= 0
              ? `최근 8주간 가격이 ${Math.abs(priceChangePct)}% 하락했어요. 현재 ${fmt(trendData[trendData.length-1].price)}로 최근 최저가에 근접한 시점입니다. 지금이 구매 적기일 수 있어요!`
              : `최근 8주간 가격이 ${Math.abs(priceChangePct)}% 상승했어요. 인기 상승으로 가격이 오르는 추세입니다. 관심 가격을 설정해 놓으면 하락 시 알려드릴게요.`
          )
        )
      ) : null,
      // Buttons
      h('div', { className: 'flex flex-col-reverse sm:flex-row gap-3 sm:gap-4 mt-6' },
        h('button', { onClick: onClose, className: 'flex-1 bg-slate-50 text-slate-400 font-bold py-3.5 sm:py-4 rounded-xl sm:rounded-[20px] hover:bg-slate-100 transition-all' }, '취소'),
        h('button', { onClick: onStartTracking, className: 'flex-[2] bg-[#111] text-white font-medium py-4 rounded-xl flex items-center justify-center gap-3 shadow-card hover:bg-[#333] transition-all' },
          h(Bell, { size: 20 }), activeTab === 'TRACK' ? '모니터링 활성화' : '가격 알림 설정'
        )
      )
    )
  );
}

    const lower = namesJoined.toLowerCase();
    if (/플로럴|스트라이프|체크|패턴|멀티|배색|컬러블록|타이다이|투톤|믹스|도트|그라데이션/.test(lower)) return true;
    const groups = [...new Set(colorList.map(c => getProductColorGroup(c.name)).filter(Boolean))];
    return groups.length >= 2;
  };

  const matchesSearchFilters = (product) => {
    const brandMatch = !searchFilters.brand.length || searchFilters.brand.includes(product.brand);
    const selectedColors = searchFilters.color;
    const colorMatch = !selectedColors.length || selectedColors.some(sel => {
      if (sel === MULTICOLOR_FILTER_VALUE) return productMatchesMulticolorFilter(product);
      return (product.colors || []).some(color => getProductColorGroup(color.name) === sel);
    });
    const presetRange = PRICE_FILTER_OPTIONS.find(option => option.value === searchFilters.pricePreset);
    const customMin = searchFilters.priceMin ? Number(searchFilters.priceMin) : null;
    const customMax = searchFilters.priceMax ? Number(searchFilters.priceMax) : null;
    const minPrice = searchFilters.pricePreset === 'custom' ? customMin : (presetRange?.min ?? null);
    const maxPrice = searchFilters.pricePreset === 'custom' ? customMax : (presetRange?.max ?? null);
    const priceMatch = (minPrice === null || product.price >= minPrice) && (maxPrice === null || product.price <= maxPrice);
    const categoryMatch =
      !searchFilters.category ||
      (searchFilters.category === 'top'
        ? TOP_CATEGORY_KEYS.includes(product.category)
        : product.category === searchFilters.category);
    const vibe = getProductFeedVibeMeta(product);
    const moodMatch = !searchFilters.mood.length || searchFilters.mood.includes(vibe.mood);
    const situationMatch = !searchFilters.situation.length || searchFilters.situation.includes(vibe.situation);
    const seasonMatch = !searchFilters.season.length || searchFilters.season.includes(vibe.season);
    return brandMatch && colorMatch && priceMatch && categoryMatch && moodMatch && situationMatch && seasonMatch;
  };

  const hasActiveSearchFilters = Boolean(
    searchFilters.brand.length ||
    searchFilters.color.length ||
    searchFilters.pricePreset ||
    searchFilters.priceMin ||
    searchFilters.priceMax ||
    searchFilters.category ||
    searchFilters.mood.length ||
    searchFilters.situation.length ||
    searchFilters.season.length
  );
  const isSearchFilterActive = (key) => {
    if (key === 'brand') return Boolean(searchFilters.brand.length);
    if (key === 'color') return Boolean(searchFilters.color.length);
    if (key === 'price') return Boolean(searchFilters.pricePreset || searchFilters.priceMin || searchFilters.priceMax);
    if (key === 'category') return Boolean(searchFilters.category);
    if (key === 'mood') return Boolean(searchFilters.mood.length);
    if (key === 'situation') return Boolean(searchFilters.situation.length);
    if (key === 'season') return Boolean(searchFilters.season.length);
    return false;
  };

  const formatPriceInput = (value) => value ? Number(value).toLocaleString() : '';

  /** 홈 탐색 오버레이·대화 탭 등 공통: masonry 그리드 또는 가로 한 줄(row) */
  const renderProductSpGrid = (items, keyPrefix, onPickProduct, anchorProduct, opts = {}) => {
    if (!items || items.length === 0) return null;
    const row = opts.layout === 'row';
    /** 대화 탭 등: 이미지 비율·카드 높이 통일 (가로 배열 그리드) */
    const uniformGrid = opts.layout === 'uniformGrid';
    const uniformAspect = 'aspect-[4/5]';
    const renderCard = (sp, i) => {
      const isW = wishClothes.some((w) => w.id === sp.id || w.id === 'w_' + sp.id);
      const imgSrc =
        keyPrefix === 'br'
          ? homePinSrc(SAME_BRAND_GRID_IMAGES[i % SAME_BRAND_GRID_IMAGES.length])
          : productDisplayImage(sp);
      const aspect = row ? 'aspect-[3/4]' : uniformGrid ? uniformAspect : HOME_FEED_ASPECT_CLASSES[i % HOME_FEED_ASPECT_CLASSES.length];
      const discount =
        sp.originalPrice && sp.originalPrice > sp.price
          ? Math.round((1 - sp.price / sp.originalPrice) * 100)
          : 0;
      const showBrand =
        keyPrefix === 'br' && sp._sameBrandTierFallback && anchorProduct
          ? anchorProduct.brand
          : sp.brand;
      const showName =
        keyPrefix === 'br' && sp._sameBrandTierFallback && anchorProduct
          ? anchorProduct.brand + ' · ' + sp._sameBrandLineName
          : sp.name;
      const cardHoverId = keyPrefix + '-' + sp.id + '-' + i;
      const cardClass = row
        ? 'flex-shrink-0 snap-start rounded-xl overflow-hidden border border-[#ebebeb] bg-white shadow-sm cursor-pointer hover:shadow-md transition-shadow max-sm:w-[calc((100vw-4.25rem)/3.5)] sm:w-[180px] lg:w-[200px]'
        : uniformGrid
          ? 'min-w-0 rounded-xl overflow-hidden border border-[#ebebeb] bg-white shadow-sm cursor-pointer hover:shadow-md transition-shadow flex flex-col'
          : 'break-inside-avoid mb-3 sm:mb-4 rounded-2xl overflow-hidden border border-[#ebebeb] bg-white shadow-sm cursor-pointer hover:shadow-md transition-shadow';
      return h('div', {
        key: cardHoverId,
        className: cardClass,
        onClick: () => onPickProduct(sp),
      },
        h('div', {
          className: 'relative w-full bg-[#f5f5f5] product-card-hover ' + aspect,
        },
          h('img', {
            src: imgSrc,
            alt: '',
            className: 'w-full h-full object-cover',
            referrerPolicy: 'no-referrer',
            onError: (e) => {
              const el = e.currentTarget;
              if (sp.image && el.src !== sp.image) {
                el.onerror = null;
                el.src = sp.image;
              }
            },
          }),
          h('button', {
            type: 'button',
            className: 'absolute top-2 right-2 z-10 w-8 h-8 flex items-center justify-center bg-transparent border-0 p-0 shadow-none outline-none transition-transform hover:scale-110 active:scale-95',
            onClick: (e) => {
              e.stopPropagation();
              toggleWishlist(sp);
            },
            'aria-label': isW ? '위시에서 빼기' : '위시에 담기',
          }, h(Heart, {
            size: 18,
            className: isW
              ? 'text-red-500 drop-shadow-[0_1px_2px_rgba(0,0,0,0.35)]'
              : 'text-white drop-shadow-[0_1px_2px_rgba(0,0,0,0.75)]',
            fill: isW ? 'currentColor' : 'none',
            strokeWidth: 2,
          })),
          h('div', {
            className:
              'product-card-actions absolute bottom-2 left-2 right-2 z-[5] hidden lg:flex items-center justify-between gap-2',
          },
            h('button', {
              type: 'button',
              className: 'flex items-center gap-1.5 rounded-[10px] bg-white px-3 py-2 text-[11px] font-semibold text-[#111] shadow-md border border-[#ebebeb] hover:bg-[#fafafa]',
              onClick: (e) => {
                e.stopPropagation();
                window.open(getProductVisitUrl(sp), '_blank', 'noopener,noreferrer');
              },
              'aria-label': '판매처 방문',
            },
              h(ArrowUpRight, { size: 14, strokeWidth: 2, className: 'shrink-0 text-[#111]' }),
              '판매처 방문'
            ),
            h('button', {
              type: 'button',
              className: 'flex h-9 w-9 shrink-0 items-center justify-center rounded-[10px] bg-white text-[#111] shadow-md border border-[#ebebeb] hover:bg-[#fafafa]',
              onClick: (e) => {
                e.stopPropagation();
                const url = getProductVisitUrl(sp);
                const title = `${sp.brand} ${sp.name}`.trim();
                if (navigator.share) {
                  navigator.share({ title, text: title, url }).catch(() => {});
                } else if (navigator.clipboard && navigator.clipboard.writeText) {
                  navigator.clipboard.writeText(url).catch(() => {});
                }
              },
              'aria-label': '공유',
            }, h(Share2, { size: 16, strokeWidth: 2 }))
          )
        ),
        h('div', { className: uniformGrid ? 'p-2.5 flex flex-col flex-1 min-h-0' : 'p-2.5' },
          h('p', { className: 'text-[10px] text-[#888] font-medium tracking-wide' }, showBrand),
          h('p', { className: 'text-[12px] text-[#111] font-medium line-clamp-2 leading-snug mt-0.5' }, showName),
          h('div', { className: 'flex items-baseline gap-1.5 flex-wrap mt-1' },
            discount > 0
              ? h('span', { className: 'text-[12px] font-bold text-orange-500' }, discount + '%')
              : null,
            h('span', { className: 'text-[13px] font-bold text-[#111]' }, fmt(sp.price))
          ),
          discount > 0
            ? h('span', {
                className:
                  'inline-flex w-fit self-start mt-1.5 bg-[#f0f0f0] text-[#888] text-[10px] font-medium px-1.5 py-0.5 rounded',
              }, '쿠폰')
            : sp.tag
              ? h('span', {
                  className:
                    'inline-flex w-fit self-start mt-1.5 bg-[#f0f0f0] text-[#888] text-[10px] font-medium px-1.5 py-0.5 rounded',
                }, sp.tag)
              : null
        )
      );
    };
    if (row) {
      return h('div', { className: 'min-w-0 w-full' },
        h(HorizontalScrollCarousel, {
          className: 'flex gap-3 overflow-x-auto overscroll-x-contain pb-0 pt-0.5 snap-x snap-mandatory scroll-smooth no-scrollbar -mx-1 px-1',
        },
          ...items.map((sp, i) => renderCard(sp, i))
        )
      );
    }
    if (uniformGrid) {
      const n = items.length;
      const trailing = opts.trailingUniformGridSlot;
      const trailingEl =
        trailing && n > 0
          ? (() => {
              const rem = n % 3;
              if (rem === 0) {
                return h(
                  'div',
                  {
                    key: 'uniform-grid-trail',
                    className: 'col-span-3 flex justify-end items-end pt-1.5 pb-0.5 min-h-0',
                    style: { gridRowStart: Math.floor(n / 3) + 1 },
                  },
                  trailing
                );
              }
              if (rem === 1) {
                return h(
                  'div',
                  {
                    key: 'uniform-grid-trail',
                    className: 'min-h-0 flex flex-col justify-end self-stretch items-end',
                    style: {
                      gridColumnStart: 3,
                      gridRowStart: Math.floor((n - 1) / 3) + 1,
                    },
                  },
                  trailing
                );
              }
              return h(
                'div',
                { key: 'uniform-grid-trail', className: 'min-h-0 flex flex-col justify-end self-stretch items-end' },
                trailing
              );
            })()
          : null;
      return h('div', { className: 'min-w-0 w-full grid grid-cols-3 gap-2 sm:gap-2.5 items-stretch' },
        ...items.map((sp, i) => renderCard(sp, i)),
        trailingEl
      );
    }
    return h('div', { className: 'min-w-0 w-full columns-2 sm:columns-3 lg:columns-4 gap-3 sm:gap-4 [column-fill:_balance]' },
      ...items.map((sp, i) => renderCard(sp, i))
    );
  };

  const renderSearchFilterButton = (key, label, opts = {}) => {
    const isDesktopOpen = openSearchFilter === key;
    const isMobileSheetOpen = isNarrowFilterViewport && homeFilterSheetOpen && homeFilterSheetAnchorKey === key;
    const isOpen = isDesktopOpen || isMobileSheetOpen;
    const hasValue = isSearchFilterActive(key);
    const chipClass = (hasValue || isOpen)
      ? 'bg-[#e6e6e6] text-[#2c2c2c] hover:bg-[#dedede]'
      : 'bg-[#f2f2f2] text-[#333333] hover:bg-[#ebebeb]';
    /** 드롭다운은 homeFilterRef 아래 단일 패널로만 렌더(가로 스크롤 overflow에 잘리지 않도록). */
    return h('div', { className: `relative shrink-0 ${isOpen ? 'z-[110]' : 'z-30'}` },
      h('button', {
        type: 'button',
        onClick: () => {
          if (isNarrowFilterViewport) {
            setOpenSearchFilter(null);
            setHomeFilterSheetAnchorKey(key);
            setHomeFilterScrollToKey(key);
            setHomeFilterSheetOpen(true);
          } else {
            setOpenSearchFilter(openSearchFilter === key ? null : key);
          }
        },
        className: `px-4 py-2 rounded-full border-0 text-sm font-semibold flex items-center gap-1.5 transition-colors ${chipClass}`
      },
        getFilterButtonLabel(key, label),
        h(ChevronDown, { size: 14, className: `text-[#444444] shrink-0 transition-transform ${isOpen ? 'rotate-180' : ''}` })
      )
    );
  };

  const renderOpenSearchFilterPanel = () => {
    if (!openSearchFilter) return null;

    if (openSearchFilter === 'brand') {
      const q = brandFilterQuery.trim().toLowerCase();
      const filteredBrands = BRAND_FILTER_OPTIONS.filter(b =>
        !q || b.label.toLowerCase().includes(q) || b.value.toLowerCase().includes(q)
      );
      return h('div', { className: 'w-full min-w-0 sm:w-[300px] sm:max-w-[calc(100vw-2rem)] bg-white border border-[#ebebeb] rounded-xl shadow-card animate-fadeIn flex flex-col flex-1 min-h-0 max-h-[min(72vh,520px)] sm:max-h-[min(72vh,520px)] sm:flex-none' },
        h('div', { className: 'px-4 pt-4 pb-3 shrink-0 border-b border-[#ebebeb]' },
          h('div', { className: 'relative' },
            h('input', {
              type: 'text',
              placeholder: '브랜드를 검색하세요.',
              value: brandFilterQuery,
              onChange: e => setBrandFilterQuery(e.target.value),
              className: 'w-full bg-transparent outline-none text-[13px] text-[#111] placeholder-[#aaa] pr-9 pb-2 border-b border-[#111] focus:border-[#111]'
            }),
            h(Search, { size: 17, className: 'absolute right-0 bottom-2 text-[#aaa] pointer-events-none', strokeWidth: 1.5 })
          )
        ),
        h('div', { className: 'overflow-y-auto px-4 py-2 flex-1 min-h-0 [scrollbar-gutter:stable]' },
          filteredBrands.length === 0
            ? h('p', { className: 'text-[13px] text-[#999] py-6 text-center' }, '검색 결과가 없습니다')
            : filteredBrands.map(option =>
                h('label', {
                  key: option.value,
                  className: 'flex items-center gap-3 py-2.5 cursor-pointer rounded-md px-1 -mx-1 hover:bg-[#fafafa]'
                },
                  h('input', {
                    type: 'checkbox',
                    checked: searchFilters.brand.includes(option.value),
                    onChange: () => {
                      setSearchFilters(prev => ({
                        ...prev,
                        brand: prev.brand.includes(option.value)
                          ? prev.brand.filter(v => v !== option.value)
                          : [...prev.brand, option.value]
                      }));
                    },
                    className: 'w-4 h-4 shrink-0 rounded border-[#ccc] text-[#111] focus:ring-[#111] focus:ring-offset-0 accent-[#111]'
                  }),
                  h('span', { className: 'text-[13px] font-normal text-[#333] select-none' }, option.label)
                )
              )
        )
      );
    }

    if (openSearchFilter === 'color') {
      const toggleColorValue = (value) => {
        setSearchFilters(prev => ({
          ...prev,
          color: prev.color.includes(value)
            ? prev.color.filter(v => v !== value)
            : [...prev.color, value]
        }));
      };
      return h('div', { className: 'w-full min-w-0 sm:w-[420px] sm:max-w-[calc(100vw-2rem)] bg-white border border-[#ebebeb] rounded-xl shadow-card px-5 sm:px-6 pt-5 pb-4 animate-fadeIn flex flex-col flex-1 min-h-0 max-h-[min(72vh,560px)] overflow-hidden sm:max-h-none sm:flex-none sm:overflow-visible' },
        h('div', { className: 'min-h-0 flex-1 overflow-y-auto pl-1 pr-3 pt-2 pb-2 [scrollbar-gutter:stable] max-h-[min(56vh,480px)] sm:max-h-[68vh] lg:max-h-[560px]' },
          h('div', { className: 'grid grid-cols-2 gap-x-5 sm:gap-x-6 gap-y-5' },
            ...COLOR_FILTER_OPTIONS.map(option =>
              h('button', {
                key: option.value,
                onClick: () => toggleColorValue(option.value),
                className: 'flex items-center gap-2.5 sm:gap-3 text-left min-h-[28px]'
              },
                h('span', {
                  className: `w-6 h-6 rounded-full flex-shrink-0 ${option.borderClass || ''} ${searchFilters.color.includes(option.value) ? 'ring-2 ring-[#111] ring-offset-2' : ''}`,
                  style: { backgroundColor: option.hex }
                }),
                h('span', { className: 'text-[14px] font-normal text-[#333] leading-none whitespace-nowrap shrink-0' }, option.label)
              )
            )
          ),
          h('div', { className: 'mt-3' },
            h('button', {
              type: 'button',
              onClick: () => toggleColorValue(MULTICOLOR_FILTER_VALUE),
              className: 'w-full flex items-center gap-2.5 sm:gap-3 text-left min-h-[32px] rounded-lg px-1 py-1 -mx-1 hover:bg-[#fafafa] transition-colors'
            },
              h('span', {
                className: `w-6 h-6 rounded-full flex-shrink-0 border border-[#ebebeb] ${searchFilters.color.includes(MULTICOLOR_FILTER_VALUE) ? 'ring-2 ring-[#111] ring-offset-2' : ''}`,
                style: { background: 'conic-gradient(from 0deg, #e11d48, #f97316, #eab308, #22c55e, #3b82f6, #8b5cf6, #e11d48)' }
              }),
              h('span', { className: 'text-[14px] font-normal text-[#333] leading-none whitespace-nowrap' }, '멀티')
            )
          )
        )
      );
    }

    if (openSearchFilter === 'price') {
      return h('div', { className: 'w-full min-w-0 sm:w-[260px] bg-white border border-[#ebebeb] rounded-xl shadow-card p-3 animate-fadeIn' },
        h('div', { className: 'divide-y divide-[#f0f0f0]' },
          ...PRICE_FILTER_OPTIONS.filter(option => option.value !== '').map(option =>
            h('button', {
              key: option.value,
              onClick: () => {
                setSearchFilters(prev => ({
                  ...prev,
                  pricePreset: option.value,
                  priceMin: option.value === 'custom' ? prev.priceMin : '',
                  priceMax: option.value === 'custom' ? prev.priceMax : ''
                }));
              },
              className: 'w-full py-4 flex items-center justify-between text-left'
            },
              h('span', { className: 'text-sm font-medium text-slate-700' }, option.label),
              h('span', { className: `w-5 h-5 rounded-full border flex items-center justify-center ${searchFilters.pricePreset === option.value ? 'border-[#111]' : 'border-[#ddd]'}` },
                searchFilters.pricePreset === option.value ? h('span', { className: 'w-2.5 h-2.5 rounded-full bg-[#111]' }) : null
              )
            )
          )
        ),
        h('div', { className: 'mt-5 space-y-4' },
          h('div', null,
            h('label', { className: 'block text-sm font-bold text-slate-800 mb-2' }, '최소 가격'),
            h('div', { className: 'relative' },
              h('input', {
                type: 'text',
                inputMode: 'numeric',
                placeholder: MOCK_PRODUCTS.length ? Math.min(...MOCK_PRODUCTS.map(p => p.price)).toLocaleString() : '0',
                value: formatPriceInput(searchFilters.priceMin),
                onChange: e => setSearchFilters(prev => ({
                  ...prev,
                  pricePreset: 'custom',
                  priceMin: e.target.value.replace(/[^0-9]/g, ''),
                })),
                className: 'w-full border border-slate-300 rounded-lg px-4 py-3 text-lg font-medium text-slate-500 outline-none focus:border-slate-500'
              }),
              h('span', { className: 'absolute right-4 top-1/2 -translate-y-1/2 text-sm text-slate-400 font-medium' }, '원')
            )
          ),
          h('div', null,
            h('label', { className: 'block text-sm font-bold text-slate-800 mb-2' }, '최대 가격'),
            h('div', { className: 'relative' },
              h('input', {
                type: 'text',
                inputMode: 'numeric',
                placeholder: MOCK_PRODUCTS.length ? Math.max(...MOCK_PRODUCTS.map(p => p.price)).toLocaleString() : '0',
                value: formatPriceInput(searchFilters.priceMax),
                onChange: e => setSearchFilters(prev => ({
                  ...prev,
                  pricePreset: 'custom',
                  priceMax: e.target.value.replace(/[^0-9]/g, ''),
                })),
                className: 'w-full border border-slate-300 rounded-lg px-4 py-3 text-lg font-medium text-slate-500 outline-none focus:border-slate-500'
              }),
              h('span', { className: 'absolute right-4 top-1/2 -translate-y-1/2 text-sm text-slate-400 font-medium' }, '원')
            )
          )
        )
      );
    }

    if (openSearchFilter === 'category') {
      return h('div', { className: 'w-full min-w-0 sm:w-56 sm:max-w-[calc(100vw-2rem)] bg-white border border-[#ebebeb] rounded-xl shadow-card p-1.5 animate-fadeIn' },
        ...CATEGORY_FILTER_OPTIONS.map(option =>
          h('button', {
            key: option.value || 'all',
            onClick: () => {
              setSearchFilters((prev) => ({
                ...prev,
                category: option.value,
                topFilters: emptyTopFilters(),
                bottomFilters: emptyBottomFilters(),
              }));
              setOpenSearchFilter(null);
            },
            className: `w-full text-left px-3 py-2 rounded-lg text-[13px] font-normal transition-all ${searchFilters.category === option.value ? 'bg-[#111] text-white' : 'text-[#333] hover:bg-[#fafafa]'}`
          }, option.label)
        )
      );
    }

    if (openSearchFilter === 'mood') {
      return h('div', { className: 'w-full min-w-0 sm:w-[300px] sm:max-w-[calc(100vw-2rem)] bg-white border border-[#ebebeb] rounded-xl shadow-card animate-fadeIn flex flex-col flex-1 min-h-0 max-h-[min(72vh,520px)] sm:max-h-[min(72vh,520px)] sm:flex-none' },
        h('div', { className: 'overflow-y-auto px-4 py-3 flex-1 min-h-0 [scrollbar-gutter:stable]' },
          FEED_MOOD_OPTIONS.map((val) =>
            h('label', {
              key: val,
              className: 'flex items-center gap-3 py-2.5 cursor-pointer rounded-md px-1 -mx-1 hover:bg-[#fafafa]'
            },
              h('input', {
                type: 'checkbox',
                checked: searchFilters.mood.includes(val),
                onChange: () => {
                  setSearchFilters((prev) => ({
                    ...prev,
                    mood: prev.mood.includes(val)
                      ? prev.mood.filter((v) => v !== val)
                      : [...prev.mood, val],
                  }));
                },
                className: 'w-4 h-4 shrink-0 rounded border-[#ccc] text-[#111] focus:ring-[#111] focus:ring-offset-0 accent-[#111]'
              }),
              h('span', { className: 'text-[13px] font-normal text-[#333] select-none' }, val)
            )
          )
        )
      );
    }

    if (openSearchFilter === 'situation') {
      return h('div', { className: 'w-full min-w-0 sm:w-[300px] sm:max-w-[calc(100vw-2rem)] bg-white border border-[#ebebeb] rounded-xl shadow-card animate-fadeIn flex flex-col flex-1 min-h-0 max-h-[min(72vh,520px)] sm:max-h-[min(72vh,520px)] sm:flex-none' },
        h('div', { className: 'overflow-y-auto px-4 py-3 flex-1 min-h-0 [scrollbar-gutter:stable]' },
          FEED_SITUATION_OPTIONS.map((val) =>
            h('label', {
              key: val,
              className: 'flex items-center gap-3 py-2.5 cursor-pointer rounded-md px-1 -mx-1 hover:bg-[#fafafa]'
            },
              h('input', {
                type: 'checkbox',
                checked: searchFilters.situation.includes(val),
                onChange: () => {
                  setSearchFilters((prev) => ({
                    ...prev,
                    situation: prev.situation.includes(val)
                      ? prev.situation.filter((v) => v !== val)
                      : [...prev.situation, val],

  const renderHome = () => {
    const qTrim = homeFeedSearchQuery.trim();
    const nameQ = qTrim.toLowerCase();
    const moodBanner = HOME_MOOD_BANNERS.find((b) => b.title === qTrim);
    const matchesName = (p) => {
      if (!nameQ) return true;
      if (moodBanner && moodBanner.feedProductIds && moodBanner.feedProductIds.length) {
        return moodBanner.feedProductIds.includes(String(p.id));
      }
      const tagL = (p.tag || '').toLowerCase();
      const categoryByLabel = CATEGORY_FILTER_OPTIONS.find(
        (o) => o.value && (o.label || '').toLowerCase() === nameQ
      );
      if (categoryByLabel) {
        if (categoryByLabel.value === 'top') return TOP_CATEGORY_KEYS.includes(p.category);
        return p.category === categoryByLabel.value;
      }
      return (
        (p.name || '').toLowerCase().includes(nameQ) ||
        (p.brand || '').toLowerCase().includes(nameQ) ||
        (tagL && tagL.includes(nameQ))
      );
    };
    const feed = MOCK_PRODUCTS.filter(matchesSearchFilters).filter(matchesName);
    const pinnedIds = new Set(HOME_LOOKBOOK_PINS.map((e) => e.productId));
    /** 동일 상품이 여러 핀(lb-05·lb-12 등)으로 중복 노출되면 위시 하트가 둘 다 같이 켜짐 → productId당 첫 핀만 */
    const feedPins = (() => {
      const seen = new Set();
      const out = [];
      for (const entry of HOME_LOOKBOOK_PINS) {
        if (seen.has(entry.productId)) continue;
        const p = MOCK_PRODUCTS.find((x) => x.id === entry.productId);
        if (p && matchesSearchFilters(p) && matchesName(p)) {
          seen.add(entry.productId);
          out.push(entry);
        }
      }
      return out;
    })();
    const feedUnpinned = feed.filter((p) => !pinnedIds.has(p.id));
    const feedUnpinnedOrdered = (() => {
      if (homeFeedRefreshKey === 0) return feedUnpinned;
      const arr = [...feedUnpinned];
      const k = homeFeedRefreshKey;
      arr.sort((a, b) => {
        const ha = (String(a.id) + k).split('').reduce((s, c) => s + c.charCodeAt(0), 0);
        const hb = (String(b.id) + k).split('').reduce((s, c) => s + c.charCodeAt(0), 0);
        return ha - hb;
      });
      return arr;
    })();
    const masonryItems = [
      ...feedPins.map((entry) => ({ kind: 'pin', entry })),
      ...feedUnpinnedOrdered.map((p) => ({ kind: 'product', product: p })),

    const aspectClasses = ['aspect-[3/4]', 'aspect-square', 'aspect-[4/5]', 'aspect-[2/3]', 'aspect-[5/7]', 'aspect-[3/5]'];

      setHomeExplore({ product: p, heroSrc: heroSrc || null });

    const canHomePull =
      view === 'HOME' &&
      !homeExplore &&
      !isDetailOpen &&
      searchOverlayOpen == null &&
      !styleChatDrawerOpen &&
      !stylePersonaScreenOpen &&
      !isAuthModalOpen &&
      !isModalOpen &&
      !chatInsightProduct &&
      !homeRefreshSpinning;
    const homeScrollTop = () => getPageScrollY();
    const handleHomePointerDown = (e) => {
      if (!canHomePull) return;
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      if (homeScrollTop() > 2) return;
      const t = e.target;
      if (t && t.closest && t.closest('button, input, textarea, a, select, label')) return;
      /** 상품 카드(이미지·텍스트) 클릭 → 상세 진입: 포인터 캡처하면 click이 깨짐 */

      homePtrRef.current = { active: true, startY: e.clientY };
      try {
        e.currentTarget.setPointerCapture(e.pointerId);
      } catch (_) {}
    };
    const handleHomePointerMove = (e) => {
      if (!homePtrRef.current.active) return;
      if (homeScrollTop() > 2) {
        homePtrRef.current.active = false;
        homePullPxRef.current = 0;
        setHomePullPx(0);
        try {
          e.currentTarget.releasePointerCapture(e.pointerId);
        } catch (_) {}
        return;

      const dy = e.clientY - homePtrRef.current.startY;

        const v = Math.min(dy * 0.45, 80);
        homePullPxRef.current = v;
        setHomePullPx(v);
      } else {
        homePullPxRef.current = 0;
        setHomePullPx(0);
      }
    };
    const handleHomePointerUp = (e) => {
      if (!homePtrRef.current.active) return;
      homePtrRef.current.active = false;
      try {
        e.currentTarget.releasePointerCapture(e.pointerId);

          h('div', { className: 'flex flex-wrap items-baseline gap-2 min-w-0' },
            h('h2', { className: 'text-lg md:text-xl font-semibold text-[#111] tracking-tight' }, '당신을 위한 추천 피드'),
            h('span', { className: 'text-[12px] text-[#999]' }, MOCK_PRODUCTS.length + '개 중 ' + feed.length + '개 표시')

                className:
                  'flex flex-nowrap items-center justify-start gap-1.5 w-max max-w-full min-w-0 sm:max-w-full overflow-x-auto overflow-y-visible touch-pan-x pb-0.5 [-ms-overflow-style:none] [scrollbar-width:none] [&::-webkit-scrollbar]:hidden cursor-grab active:cursor-grabbing',
                onPointerDown: (e) => {
                  if (e.pointerType === 'touch') return;
                  const el = e.currentTarget;

                  };
                  const onUp = () => {
                    window.removeEventListener('pointermove', onMove);
                    window.removeEventListener('pointerup', onUp);
                  };
                  window.addEventListener('pointermove', onMove, { passive: false });
                  window.addEventListener('pointerup', onUp);
                },
              },
                renderSearchFilterButton('brand', '브랜드', { alignRight: true }),
                renderSearchFilterButton('color', '색상', { alignRight: true }),
                renderSearchFilterButton('price', '가격대', { alignRight: true }),
                renderSearchFilterButton('category', '카테고리', { alignRight: true }),
                renderSearchFilterButton('mood', '무드', { alignRight: true }),
                renderSearchFilterButton('situation', '상황', { alignRight: true }),
                renderSearchFilterButton('season', '계절', { alignRight: true }),
                hasActiveSearchFilters ? h('button', {
                  type: 'button',
                  onClick: () => {
                    setSearchFilters({
                      brand: [],
                      color: [],
                      pricePreset: '',
                      priceMin: '',
                      priceMax: '',
                      category: '',
                      mood: [],
                      situation: [],
                      season: [],
                      topFilters: emptyTopFilters(),
                      bottomFilters: emptyBottomFilters(),
                    });
                    setBrandFilterQuery('');
                  },
                  className: 'shrink-0 px-2.5 py-1.5 text-[12px] font-medium text-[#888] hover:text-[#111] transition-colors'
                }, '초기화') : null
              )
            ),
            !isNarrowFilterViewport && openSearchFilter
              ? h('div', {
                  className:
                    'absolute left-0 right-0 top-full z-[100] mt-2 flex flex-col items-stretch sm:items-end overflow-visible',
                }, renderOpenSearchFilterPanel())
              : null
          )
        )
      ),
      masonryItems.length === 0
        ? h('div', { className: 'py-16 text-center text-[#888]' }, '필터 조건에 맞는 아이템이 없어요.')
        : h('div', { className: 'columns-2 sm:columns-3 lg:columns-4 gap-3 sm:gap-4 [column-fill:_balance]' },
            ...masonryItems.map((item, i) => {
              const aspect = aspectClasses[i % aspectClasses.length];
              const p = item.kind === 'pin'
                ? MOCK_PRODUCTS.find((x) => x.id === item.entry.productId)
                : item.product;
              const src = item.kind === 'pin' ? homePinSrc(item.entry.file) : productDisplayImage(item.product);
              const key = item.kind === 'pin' ? item.entry.id : 'p-' + item.product.id;
              const isWished = wishClothes.some(w => w.id === p.id || w.id === 'w_' + p.id);
              return h('div', {
                key,
                'data-home-product-card': '',
                className: 'break-inside-avoid mb-3 sm:mb-4 rounded-2xl overflow-hidden border border-[#ebebeb] bg-white shadow-sm cursor-pointer hover:shadow-md transition-shadow',
                onClick: () => openHomeProduct(p, src)
              },
                h('div', {
                  className: `relative w-full bg-[#f5f5f5] product-card-hover ${aspect}`,
                },
                  h('img', {
                    src,
                    alt: '',
                    className: 'w-full h-full object-cover',
                    referrerPolicy: 'no-referrer',
                    onError: (e) => {
                      if (p && p.image && e.currentTarget.src !== p.image) {
                        e.currentTarget.onerror = null;
                        e.currentTarget.src = p.image;
                      }
                    }
                  }),
                  h('button', {
                    type: 'button',
                    className: 'absolute top-2 right-2 z-10 w-8 h-8 flex items-center justify-center bg-transparent border-0 p-0 shadow-none outline-none transition-transform hover:scale-110 active:scale-95',
                    onClick: (e) => { e.stopPropagation(); toggleWishlist(p); },
                    'aria-label': isWished ? '위시에서 빼기' : '위시에 담기'
                  }, h(Heart, {
                    size: 18,
                    className: isWished
                      ? 'text-red-500 drop-shadow-[0_1px_2px_rgba(0,0,0,0.35)]'
                      : 'text-white drop-shadow-[0_1px_2px_rgba(0,0,0,0.75)]',
                    fill: isWished ? 'currentColor' : 'none',
                    strokeWidth: 2
                  })),
                  h('div', {
                    className:
                      'product-card-actions absolute bottom-2 left-2 right-2 z-[5] hidden lg:flex items-center justify-between gap-2',
                  },
                    h('button', {
                      type: 'button',
                      className: 'flex items-center gap-1.5 rounded-[10px] bg-white px-3 py-2 text-[11px] font-semibold text-[#111] shadow-md border border-[#ebebeb] hover:bg-[#fafafa]',
                      onClick: (e) => {
                        e.stopPropagation();
                        window.open(getProductVisitUrl(p), '_blank', 'noopener,noreferrer');
                      },
                      'aria-label': '판매처 방문',
                    },
                      h(ArrowUpRight, { size: 14, strokeWidth: 2, className: 'shrink-0 text-[#111]' }),
                      '판매처 방문'
                    ),
                    h('button', {
                      type: 'button',
                      className: 'flex h-9 w-9 shrink-0 items-center justify-center rounded-[10px] bg-white text-[#111] shadow-md border border-[#ebebeb] hover:bg-[#fafafa]',
                      onClick: (e) => {
                        e.stopPropagation();
                        const url = getProductVisitUrl(p);
                        const title = `${p.brand} ${p.name}`.trim();
                        if (navigator.share) {
                          navigator.share({ title, text: title, url }).catch(() => {});
                        } else if (navigator.clipboard && navigator.clipboard.writeText) {
                          navigator.clipboard.writeText(url).catch(() => {});
                        }
                      },
                      'aria-label': '공유',
                    }, h(Share2, { size: 16, strokeWidth: 2 }))
                  )
                ),
                h('div', { className: 'p-2.5' },
                  h('p', { className: 'text-[10px] text-[#888] font-medium tracking-wide' }, p.brand),
                  h('p', { className: 'text-[12px] text-[#111] font-medium line-clamp-2 leading-snug mt-0.5' }, p.name),
                  h('p', { className: 'text-[13px] font-bold text-[#111] mt-1' }, fmt(p.price))
                )
              );
            })
          )
      )
      , homeFilterSheetOpen && isNarrowFilterViewport ? renderHomeFilterSheet(feed.length) : null
    );
  };

  // ── SEARCH ──
  const renderSearch = () => {
    const filteredExploreProducts = exploreFilteredProducts.filter(matchesSearchFilters);
    const filteredRelatedProducts = relatedProducts.filter(matchesSearchFilters);

    /** 대화 탭 상품 클릭 → 홈과 동일 분할 패널(좌 상세·우 추천) */
    const openExploreFromChat = (product) => {
      setIsDetailOpen(false);
      setHomeExploreQuery('');
      setHomeExplore({ product, heroSrc: productDisplayImage(product) });
    };

    const hideHeroInChat = filteredExploreProducts.length > 0;

    const renderExploreBlock = (block, bi) => {
      if (!block || !block.type) return null;
      if (hideHeroInChat && (block.type === 'heroProduct' || block.type === 'sectionTitle')) return null;
      if (block.type === 'exploreAssistantText' && block.text) {
        return h(
          'p',
          {
            key: bi,
            className: 'mt-3 text-[13px] text-[#222] leading-relaxed font-normal whitespace-pre-wrap',
          },
          formatExploreAssistantContent(block.text)
        );
      }
      if (block.type === 'brandMoodSplit') {
        const items = (block.items || []).slice(0, 3);
        return h(
          'div',
          { key: bi, className: 'mt-3 rounded-2xl bg-white p-2 sm:p-3' },
          h(
            'div',
            { className: 'grid grid-cols-1 gap-2 md:grid-cols-[1.05fr_1fr] md:gap-3' },
            h(
              'div',
              { className: 'overflow-hidden rounded-lg border border-[#e5e7eb] bg-white' },
              h('img', {
                src: block.moodImage,
                alt: '',
                className: 'h-full w-full min-h-[210px] object-cover',
                loading: 'lazy',
                decoding: 'async',
                referrerPolicy: 'no-referrer',
              })
            ),
            h(
              'div',
              { className: 'flex flex-col gap-2' },
              ...items.map((it, ii) =>
                h(
                  'button',
                  {
                    type: 'button',
                    key: 'brand-mood-item-' + ii,
                    onClick: () => openExploreFromChat(it),
                    className:
                      'flex items-start gap-2 rounded-lg border border-[#e5e7eb] bg-white p-2 text-left hover:border-[#cbd5e1] transition-colors',
                  },
                  h(
                    'div',
                    { className: 'w-[74px] h-[74px] shrink-0 overflow-hidden rounded-md bg-[#f3f4f6]' },
                    h('img', {
                      src: productDisplayImage(it),
                      alt: '',
                      className: 'h-full w-full object-cover',
                      loading: 'lazy',
                      decoding: 'async',
                      referrerPolicy: 'no-referrer',
                    })
                  ),
                  h('div', { className: 'min-w-0 flex-1' },
                    h('p', { className: 'text-[10px] text-[#6b7280] truncate' }, it.brand),
                    h('p', { className: 'text-[11px] font-semibold text-[#111] leading-snug line-clamp-2 mt-0.5' }, it.name),
                    h('p', { className: 'text-[10px] text-[#9ca3af] line-through mt-1' }, fmt(Math.round(it.price * 1.5))),
                    h('p', { className: 'text-[12px] font-bold text-[#f97316] leading-none mt-1' }, Math.floor(30 + ii) + '%'),
                    h('p', { className: 'text-[13px] font-bold text-[#111] leading-none mt-1' }, fmt(it.price))
                  )
                )
              )
            )
          )
        );
      }
      if (block.type === 'lookbookMatch') {
        const accent = 'text-rose-500';
        const items = block.items || [];
        const matchGridCols =
          items.length <= 1 ? 'lg:grid-cols-1' : items.length === 2 ? 'lg:grid-cols-2' : 'lg:grid-cols-3';
        return h(
          'div',
          { key: bi, className: 'mt-3 w-full min-w-0' },
          h(
            'div',
            {
              className:
                'flex flex-row flex-nowrap items-stretch gap-2 overflow-x-auto overflow-y-visible overscroll-x-contain pb-2 ' +
                'snap-x snap-mandatory touch-pan-x [-webkit-overflow-scrolling:touch] ' +
                '-mx-1 px-1 [scrollbar-gutter:stable] ' +
                'lg:mx-0 lg:px-0 lg:overflow-visible lg:pb-0 lg:snap-none lg:gap-6',
            },
            h(
              'div',
              {
                className:
                  'shrink-0 snap-start flex flex-col ' +
                  'w-[min(50vw,176px)] min-w-[min(50vw,176px)] ' +
                  'lg:min-w-0 lg:w-auto lg:max-w-[34%]',
              },
              h(
                'p',
                { className: `mb-2 text-[11px] font-bold uppercase tracking-wide ${accent}` },
                'CODY'
              ),
              h(
                'div',
                { className: 'relative flex w-full justify-center overflow-hidden rounded-2xl border-2 border-rose-400/90 bg-white shadow-sm' },
                h('img', {
                  src: block.lookbookImage,
                  alt: '',
                  className:
                    'h-auto w-full max-h-[min(30vh,240px)] object-contain object-center ' +
                    'lg:max-h-[min(52vh,380px)]',
                  loading: 'lazy',
                  decoding: 'async',
                  referrerPolicy: 'no-referrer',
                }),
                h(
                  'span',
                  {
                    className:
                      'pointer-events-none absolute bottom-2 right-2 z-[1] rounded-md bg-white/95 px-2 py-0.5 text-[10px] font-semibold tracking-tight text-rose-600 shadow-sm ring-1 ring-rose-200/80 backdrop-blur-[2px]',
                    'aria-hidden': true,
                  },
                  '입어보기'
                )
              ),
              block.lookbookCaption
                ? h(
                    'p',
                    { className: 'mt-2 text-center text-[11px] leading-snug text-[#888]' },
                    block.lookbookCaption
                  )
                : null
            ),
            h(
              'div',
              {
                className:
                  'shrink-0 snap-start flex min-w-0 flex-col gap-2 ' +
                  'lg:flex-1 lg:snap-none',
              },
              h('p', { className: 'mb-0 text-[11px] font-semibold text-[#111] sm:text-[12px] lg:mb-3' }, '→ 추천 아이템'),
              h(
                'div',
                {
                  className:
                    'flex flex-nowrap gap-2 ' +
                    'lg:grid lg:gap-3 lg:overflow-visible lg:pb-0 ' +
                    matchGridCols,
                },
                ...items.map((it, ii) =>
                  h(
                    'button',
                    {
                      type: 'button',
                      key: 'lookbook-match-' + ii,
                      onClick: () => openExploreFromChat(lookbookMatchItemToProduct(it, bi, ii)),
                      className:
                        'flex w-[min(36vw,142px)] shrink-0 snap-start flex-col rounded-lg border border-[#ebebeb] bg-white p-2 shadow-sm ' +
                        'text-left transition-colors hover:border-rose-300 hover:bg-rose-50/40 active:scale-[0.99] ' +
                        'focus:outline-none focus-visible:ring-2 focus-visible:ring-rose-400/50 focus-visible:ring-offset-1 ' +
                        'lg:w-auto lg:min-w-0 lg:rounded-xl lg:p-2.5 lg:snap-none',
                    },
                    h(
                      'div',
                      { className: 'relative w-full overflow-hidden rounded-lg bg-[#f0f0f0]' },
                      h('img', {
                        src: it.image,
                        alt: '',
                        className: 'aspect-[3/4] w-full object-cover',
                        loading: 'lazy',
                        decoding: 'async',
                        referrerPolicy: 'no-referrer',
                      })
                    ),
                    h('p', { className: `mt-2 text-[11px] font-semibold ${accent}` }, '[' + it.categoryLabel + ']'),
                    h('p', { className: 'text-[13px] font-bold leading-snug text-[#111] line-clamp-2' }, it.title),
                    h('p', { className: 'mt-1.5 text-[11px] text-[#888]' }, it.brand),
                    h('p', { className: 'mt-1 text-[14px] font-bold text-[#111]' }, fmt(it.price))
                  )
                )
              )
            )
          )
        );
      }
      if (block.type === 'highlight') {
        return h('p', { key: bi, className: 'text-[12px] text-[#444] leading-relaxed' }, formatInlineBold(block.text));
      }
      if (block.type === 'sectionTitle') {
        return h('h3', { key: bi, className: 'text-[13px] font-semibold text-[#111] tracking-tight pt-1' }, block.title);
      }
      if (block.type === 'spacer') {
        return h('div', { key: bi, className: 'h-2' });
      }
      if (block.type === 'divider') {
        return h('div', { key: bi, className: 'border-t border-[#ebebeb] my-3' });
      }
      if (block.type === 'heroProduct') {
        const p = block.product;
        const disc = p.originalPrice ? Math.round((1 - p.price / p.originalPrice) * 100) : 0;
        return h('div', {
          key: bi,
          className: 'rounded-xl border border-[#ebebeb] bg-[#fafafa] overflow-hidden shadow-card max-w-full',
        },
          h('button', {
            type: 'button',
            className: 'w-full text-left',
            onClick: () => { setChatInsightProduct(p); setChatInsightOtherOpen(false); },
          },
            h('div', { className: 'aspect-[4/3] bg-[#f0f0f0] overflow-hidden' },
              h('img', { src: p.image, alt: '', className: 'w-full h-full object-cover', referrerPolicy: 'no-referrer' })
            ),
            h('div', { className: 'p-3.5 space-y-2' },
              h('h4', { className: 'text-[14px] font-semibold text-[#111] leading-snug line-clamp-2' }, p.name),
              h('div', { className: 'flex flex-wrap items-baseline gap-x-2 gap-y-0.5' },
                h('span', { className: 'text-[15px] font-semibold text-[#111]' }, fmt(p.price)),
                p.originalPrice ? h('span', { className: 'text-[11px] text-[#bbb] line-through' }, fmt(p.originalPrice)) : null,
                disc > 0 ? h('span', { className: 'text-[10px] font-medium text-[#c00]' }, disc + '%') : null
              ),
              h('p', { className: 'text-[10px] text-[#888]' }, block.retailers),
              h('div', { className: 'flex items-center gap-2 text-[11px] text-[#555]' },
                h('span', { className: 'text-amber-500' }, '★ ' + block.rating),
                h('span', { className: 'text-[#999]' }, '(' + block.reviewCount.toLocaleString() + ' 리뷰)')
              ),
              h('p', { className: 'text-[12px] text-[#555] leading-relaxed pt-0.5' }, block.summary),
              h('ul', { className: 'space-y-1.5 pt-1' },
                ...block.bullets.map((b, j) =>
                  h('li', { key: j, className: 'text-[11px] text-[#444] leading-snug pl-0.5 border-l-2 border-[#ebebeb] pl-2' },
                    h('span', { className: 'font-semibold text-[#111]' }, b.k + ' · '),
                    b.v
                  )
                )
              ),
              block.note ? h('p', { className: 'text-[11px] text-[#666] leading-relaxed pt-1 border-t border-[#eee] mt-2' }, formatInlineBold(block.note)) : null
            )
          ),
          h('div', { className: 'flex border-t border-[#ebebeb] bg-white' },
            h('button', {
              type: 'button',
              className: 'flex-1 py-2.5 text-[11px] font-medium text-[#111] hover:bg-[#fafafa] transition-colors',
              onClick: (e) => { e.stopPropagation(); setChatInsightProduct(p); setChatInsightOtherOpen(false); },
            }, '자세히 · 판매처 비교'),
            h('button', {
              type: 'button',
              className: 'flex-1 py-2.5 text-[11px] font-medium text-[#666] border-l border-[#ebebeb] hover:bg-[#fafafa]',
              onClick: (e) => { e.stopPropagation(); openExploreFromChat(p); },
            }, '상품 상세')
          )
        );
      }
      if (block.type === 'comparisonTable') {
        const prods = block.products || [];
        const rows = block.rows || [];
        return h('div', { key: bi, className: 'space-y-2' },
          h('p', { className: 'text-[12px] font-semibold text-[#111]' }, '비교 테이블'),
          h('div', { className: 'overflow-x-auto -mx-0.5 pb-1' },
            h('div', { className: 'inline-flex min-w-full rounded-xl border border-[#ebebeb] bg-white overflow-hidden' },
              h('div', { className: 'w-[72px] flex-shrink-0 border-r border-[#ebebeb] bg-[#fafafa]' },
                h('div', { className: 'h-[72px] border-b border-[#ebebeb]' }),
                ...rows.map((row, ri) =>
                  h('div', { key: ri, className: 'px-2 py-2 text-[10px] text-[#888] border-b border-[#ebebeb] last:border-b-0 leading-tight' }, row.label)
                )
              ),
              ...prods.map((p, pi) =>
                h('div', { key: p.id, className: 'w-[108px] flex-shrink-0 border-r border-[#ebebeb] last:border-r-0' },
                  h('button', {
                    type: 'button',
                    className: 'w-full',
                    onClick: () => openExploreFromChat(p),
                  },
                    h('div', { className: 'h-[72px] bg-[#f5f5f5]' },
                      h('img', { src: p.image, alt: '', className: 'w-full h-full object-cover' })
                    ),
                    h('div', { className: 'p-1.5 border-b border-[#ebebeb] min-h-[2.75rem]' },
                      h('p', { className: 'text-[9px] font-semibold text-[#111] line-clamp-2 leading-tight text-left' }, p.name),
                      h('p', { className: 'text-[9px] text-[#111] font-medium mt-0.5 text-left' }, fmt(p.price))
                    )
                  ),
                  ...rows.map((row, ri) =>
                    h('div', { key: ri, className: 'px-1.5 py-2 text-[10px] text-[#333] border-b border-[#ebebeb] last:border-b-0 text-left leading-tight' }, row.values[pi])
                  )
                )
              )
            )
          ),
          h('p', { className: 'text-[10px] text-[#aaa] text-center' }, '열을 좌우로 스와이프')
        );
      }
      return null;
    };

    const SEARCH_LIST_INITIAL = 3;
    const SEARCH_LIST_MORE = 12;
    const searchListFull = filteredExploreProducts;
    const searchListVisibleCount = searchShowMoreProducts
      ? Math.min(searchListFull.length, SEARCH_LIST_INITIAL + SEARCH_LIST_MORE)
      : Math.min(searchListFull.length, SEARCH_LIST_INITIAL);
    const searchListSlice = searchListFull.slice(0, searchListVisibleCount);
    const searchMoreAddCount = Math.min(
      SEARCH_LIST_MORE,
      Math.max(0, searchListFull.length - SEARCH_LIST_INITIAL)
    );
    const searchCanShowMore = searchMoreAddCount > 0 && !searchShowMoreProducts;
    const searchCanShowLess = searchShowMoreProducts && searchListFull.length > SEARCH_LIST_INITIAL;

    let lastAssistantIdx = -1;
    for (let i = exploreMessages.length - 1; i >= 0; i--) {
      if (exploreMessages[i].role === 'assistant') {
        lastAssistantIdx = i;
        break;
      }
    }

    const renderSearchProductEmbed = () => {
      if (exploreFilteredProducts.length === 0) return null;
      return h('div', { className: 'mt-3 pt-3 border-t border-[#f0f0f0] space-y-2' },
        exploreFilteredProducts.length > 0 && filteredExploreProducts.length > 0
          ? h('div', { className: 'flex flex-wrap items-center gap-2' },
              h('span', { className: 'text-[11px] text-[#999]' }, filteredExploreProducts.length + '개 중 ' + searchListVisibleCount + '개 표시')
            )
          : null,
        exploreFilteredProducts.length > 0
          ? filteredExploreProducts.length > 0
            ? h('div', { className: 'min-w-0 w-full' },
                renderProductSpGrid(searchListSlice, 'q', openExploreFromChat, null, {
                  layout: 'uniformGrid',
                  trailingUniformGridSlot: searchCanShowLess
                    ? h('button', {
                        type: 'button',
                        onClick: () => setSearchShowMoreProducts(false),
                        className:
                          'inline-flex items-center rounded-full border border-[#e0e0e0] bg-[#fafafa] px-3 py-1 text-[11px] font-medium text-[#555] hover:bg-[#f0f0f0] hover:border-[#d5d5d5] transition-colors',
                      }, 'Show less')
                    : null,
                }),
                searchCanShowMore ? h('div', { className: 'flex justify-end pt-2 pb-1' },
                  h('button', {
                    type: 'button',
                    onClick: () => setSearchShowMoreProducts(true),
                    className: 'inline-flex items-center rounded-full border border-[#e0e0e0] bg-[#fafafa] px-3 py-1 text-[11px] font-medium text-[#555] hover:bg-[#f0f0f0] hover:border-[#d5d5d5] transition-colors'
                  }, 'Show ' + searchMoreAddCount + ' more')
                ) : null,
                searchShowMoreProducts && searchListFull.length > SEARCH_LIST_INITIAL + SEARCH_LIST_MORE
                  ? h('p', { className: 'text-[10px] text-[#aaa] text-center pt-2 pb-1' }, '총 ' + searchListFull.length + '개 중 15개까지 표시 · 필터로 범위를 좁혀 보세요')
                  : null
              )
            : h('div', { className: 'py-8 text-center' },
                h(Sparkles, { size: 22, className: 'mx-auto mb-2 text-[#ddd]' }),
                h('p', { className: 'text-[13px] text-[#666] font-medium' }, '필터 조건에 맞는 상품이 없어요')
              )
          : null,
        filteredRelatedProducts.length > 0 ? h('div', { className: 'pt-3 border-t border-[#f0f0f0]' },
          h('div', { className: 'flex items-center justify-between mb-2' },
            h('h3', { className: 'text-[12px] font-semibold text-[#14532d] tracking-tight' }, '실시간 추천'),
            h('span', { className: 'text-[10px] text-[#888]' }, filteredRelatedProducts.length + '개')

          h('p', { className: 'text-[10px] text-[#888] mb-2' }, relatedLabel),
